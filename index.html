<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
  <title>Frontend Mentor | Pod request access landing page</title>
</head>
<body>
  <section class="img-container">
    <section class="container">
      <header class="head">
        <img src="./assets/desktop/logo.svg" alt="pod logo">
      </header>
      
      <main class="info">
    
        <h1>Publish your podcasts <span class="span-h1"><br>everywhere.</span></h1>
        <p>Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify, 
        Apple Podcasts, Google Podcasts, Pocket Casts and more!</p>
        
        <form id="form-email" class="btn-request" novalidate>
          <input id="address-email" class="email" type="email" placeholder="Email address" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" required>
          <button class="btn-itself">Request Access</button>
          
        </form>
        <p class="error-msg">Oops! Please check your email</p>

        <footer class="foot">
          <img src="./assets/desktop/spotify.svg" alt="spotify logo">
          <img src="./assets/desktop/apple-podcast.svg" alt="apple podcasts logo">
          <img src="./assets/desktop/google-podcasts.svg" alt="google podcasts logo">
          <img src="./assets/desktop/pocket-casts.svg" alt="pocket casts logo">
        </footer>

      </main>
      
    </section>
    <div class="dots-style"></div>
  </section>
</body>
<script src="./src/js/script.js"></script>
</html>
